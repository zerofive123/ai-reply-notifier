<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 回复提醒</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-container">
    <h1>AI 回复提醒</h1>

    <section class="summary">
      <h2>当前设置</h2>
      <ul>
        <li>ChatGPT 提醒：<span id="chatgpt-status">--</span></li>
        <li>Gemini 提醒：<span id="gemini-status">--</span></li>
        <li>系统通知：<span id="system-notification-status">--</span></li>
        <li>提醒模式：<span id="notify-mode-status">--</span></li>
        <li>无操作判定：<span id="inactivity-status">--</span></li>
        <li>冷却时间：<span id="cooldown-status">--</span></li>
        <li>调试面板：<span id="panel-status">--</span></li>
        <li>调试日志：<span id="logs-status">--</span></li>
      </ul>
    </section>

    <button id="open-options-btn" class="primary">打开设置页面</button>
    <p id="popup-status" class="status"></p>
  </main>

  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
